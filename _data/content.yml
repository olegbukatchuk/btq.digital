### Services [ services ]
services:
  title: "Services"
  items:
    - icon: "code"
      name: "Development"
      text: "SaaS product development: architecture, UI/UX, backend, and frontend design."

    - icon: "compass"
      name: "Strategy"
      text: "We create digital strategies aimed at growth and engagement."

    - icon: "heart"
      name: "Promotion"
      text: "We promote brands and products on social media, increasing reach and audience loyalty."

